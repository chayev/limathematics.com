{{ define "main" }}
<section class="container" style="padding-top: 100px; min-height: 80vh;">
    <article class="post-content glass-card" style="padding: 4rem;">
        <h1>{{ .Title }}</h1>
        <p class="post-date" style="margin-bottom: 2rem;">{{ .Date.Format "January 2, 2006" }}</p>
        
        <div class="markdown-content">
            {{ .Content }}
        </div>
        
        <div style="margin-top: 4rem; text-align: center;">
            <a href="{{ "post/" | absURL }}" class="btn-primary-sm">&larr; Back to Blog</a>
        </div>
    </article>
</section>
{{ end }}
