{{ define "main" }}
<section class="container" style="padding-top: 100px; min-height: 80vh;">
    <div class="blog-header">
        <h1 class="section-title">LI Mathematics <span>Blog</span></h1>
        <p class="section-subtitle">Insights, study tips, and updates for high school mathematics.</p>
    </div>
    
    <div class="post-list">
        {{ range .Pages }}
        <a href="{{ .RelPermalink }}" class="post-card glass-card">
            <h3>{{ .Title }}</h3>
            <p class="post-date">{{ .Date.Format "January 2, 2006" }}</p>
            <p>{{ .Summary }}</p>
        </a>
        {{ end }}
    </div>
</section>
{{ end }}
